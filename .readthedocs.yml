version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.12"
        # The maturin build compiles the Rust core. Without a committed
        # Cargo.lock the resolver picks current crate versions, whose
        # edition requirements track recent Rust — pin to latest.
        rust: "latest"

python:
    install:
        - requirements: docs/requirements.txt
        # Install (and compile) transitio itself so autodoc imports the real
        # package instead of relying on mocks. Build deps come from
        # pyproject.toml's build-system requires.
        - method: pip
          path: .

sphinx:
    configuration: docs/conf.py
